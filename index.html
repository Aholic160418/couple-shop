<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🦫 水豚噜噜小店</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brown: #c4956a; --brown-dark: #a0764a; --caramel: #e8c9a0;
  --cream: #fef9f4; --warm-white: #fffaf5; --orange: #f4a261;
  --orange-light: #fce4cc; --green: #8db580; --text: #5c4033;
  --text-light: #b0a090; --border: #f0e6da;
  --shadow: 0 2px 16px rgba(139, 109, 82, 0.08);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #fef8f2; background-image:
    radial-gradient(ellipse at 20% 10%, rgba(244,162,97,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(196,149,106,0.05) 0%, transparent 50%);
  color: var(--text); font-size: 14px;
  max-width: 450px; margin: 0 auto; min-height: 100vh; padding-bottom: 70px;
  -webkit-tap-highlight-color: transparent;
}

/* Header */
.header { padding: 16px 16px 4px; display: flex; align-items: center; gap: 10px; }
.header-capy { font-size: 40px; line-height: 1; }
.header-title { font-size: 20px; font-weight: 700; color: var(--brown-dark); }
.header-sub { font-size: 12px; color: var(--text-light); }

/* Tab Bar */
.tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 450px; background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px); display: flex;
  border-top: 1px solid var(--border); z-index: 100;
  padding-bottom: env(safe-area-inset-bottom); border-radius: 20px 20px 0 0; }
.tab-item { flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 8px 0 6px; color: #ccc; font-size: 10px; font-weight: 500;
  cursor: pointer; transition: all .25s; border: none; background: none;
  position: relative; }
.tab-item.active { color: var(--brown); }
.tab-item.active::before { content: ''; position: absolute; top: 0; left: 50%;
  transform: translateX(-50%); width: 24px; height: 3px;
  background: var(--brown); border-radius: 0 0 3px 3px; }
.tab-icon { font-size: 22px; margin-bottom: 1px; transition: transform .25s; }
.tab-item.active .tab-icon { transform: scale(1.15); }

/* Pages */
.page { display: none; padding: 12px 16px 20px; min-height: calc(100vh - 120px); }
.page.active { display: block; animation: fadeIn .3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Category Bar */
.cat-scroll { margin-bottom: 14px; }
.cat-bar { display: flex; gap: 8px; padding: 4px 0; overflow-x: auto; -ms-overflow-style: none; scrollbar-width: none; }
.cat-bar::-webkit-scrollbar { display: none; }
.cat-item { display: flex; flex-direction: column; align-items: center;
  padding: 12px 16px; border-radius: 18px; background: #fff;
  font-size: 12px; font-weight: 500; color: #c5b8a8; cursor: pointer;
  white-space: nowrap; transition: all .3s cubic-bezier(.4,0,.2,1);
  border: 2px solid transparent; flex-shrink: 0; }
.cat-item.active { background: var(--brown); color: #fff; border-color: var(--brown-dark);
  box-shadow: 0 4px 16px rgba(196,149,106,0.3); transform: translateY(-1px); }
.cat-icon { font-size: 26px; margin-bottom: 2px; transition: transform .3s; }
.cat-item.active .cat-icon { transform: scale(1.2); }

/* Product Grid */
.product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.product-card { background: #fff; border-radius: 20px; overflow: hidden;
  box-shadow: var(--shadow); cursor: pointer; transition: all .3s cubic-bezier(.4,0,.2,1);
  border: 2px solid transparent; }
.product-card:active { transform: scale(0.97); }
.product-img-box { width: 100%; height: 150px; display: flex; align-items: center;
  justify-content: center; position: relative; overflow: hidden; }
.product-emoji { font-size: 60px; line-height: 1; position: relative; z-index: 1;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.08)); transition: transform .3s; }
.product-card:active .product-emoji { transform: scale(1.1); }
.product-img-box.drink { background: linear-gradient(135deg, #fce4cc 0%, #fef0e0 100%); }
.product-img-box.snack { background: linear-gradient(135deg, #fdf0d5 0%, #fef9f0 100%); }
.product-img-box.emotion { background: linear-gradient(135deg, #fde2e2 0%, #fef5f5 100%); }
.product-img-box.fruit { background: linear-gradient(135deg, #e8f5e0 0%, #f5faf0 100%); }
.product-info { padding: 12px 14px; }
.product-name { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.product-bottom { display: flex; justify-content: space-between; align-items: center; }
.product-price { color: var(--brown); font-size: 17px; font-weight: 700; }
.product-price::before { content: '¥'; font-size: 13px; margin-right: 1px; }
.add-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--brown);
  color: #fff; border: none; font-size: 18px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: all .2s;
  box-shadow: 0 2px 8px rgba(196,149,106,0.3); }
.add-btn:active { transform: scale(0.9); background: var(--brown-dark); }

/* Section Title */
.section-title { font-size: 16px; font-weight: 700; color: var(--brown-dark);
  margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

/* Cart */
.cart-item { display: flex; align-items: center; background: #fff;
  padding: 12px; border-radius: 18px; margin-bottom: 10px;
  box-shadow: var(--shadow); }
.cart-img-box { width: 72px; height: 72px; border-radius: 14px; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0; }
.cart-emoji { font-size: 34px; }
.cart-img-box.drink { background: linear-gradient(135deg, #fce4cc, #fef0e0); }
.cart-img-box.snack { background: linear-gradient(135deg, #fdf0d5, #fef9f0); }
.cart-img-box.emotion { background: linear-gradient(135deg, #fde2e2, #fef5f5); }
.cart-img-box.fruit { background: linear-gradient(135deg, #e8f5e0, #f5faf0); }
.cart-body { flex: 1; margin-left: 12px; }
.cart-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.cart-price { font-size: 16px; color: var(--brown); font-weight: 700; margin-bottom: 8px; }
.cart-price::before { content: '¥'; font-size: 12px; }
.cart-qty { display: flex; align-items: center; gap: 10px; }
.qty-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #e8ddd0;
  background: none; font-size: 16px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; color: var(--text-light);
  transition: all .2s; }
.qty-btn:active { background: var(--caramel); border-color: var(--brown); color: var(--brown); }
.qty-num { font-size: 15px; font-weight: 600; min-width: 20px; text-align: center; }
.cart-del { color: #d4c8b8; font-size: 12px; cursor: pointer; padding: 6px;
  border: none; background: none; transition: color .2s; }
.cart-del:active { color: #e88; }

/* Bottom Bar */
.bottom-bar { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 450px; background: rgba(255,255,255,0.97);
  backdrop-filter: blur(10px); display: flex; align-items: center;
  justify-content: space-between; padding: 14px 18px;
  box-shadow: 0 -4px 20px rgba(139,109,82,0.08); z-index: 99;
  border-radius: 20px 20px 0 0; }
.total-label { font-size: 13px; color: var(--text-light); }
.total-price { font-size: 22px; color: var(--brown); font-weight: 700; }
.total-price::before { content: '¥'; font-size: 15px; }
.submit-btn { padding: 12px 32px; background: linear-gradient(135deg, var(--brown), var(--brown-dark));
  color: #fff; border: none; border-radius: 24px; font-size: 15px; font-weight: 600;
  cursor: pointer; box-shadow: 0 4px 16px rgba(196,149,106,0.35); transition: all .2s; }
.submit-btn:active { transform: scale(0.96); }

/* Order Card */
.order-card { background: #fff; border-radius: 18px; padding: 16px; margin-bottom: 12px;
  box-shadow: var(--shadow); }
.order-header { display: flex; justify-content: space-between; align-items: center;
  padding-bottom: 12px; border-bottom: 1px solid #f8f0e8; margin-bottom: 10px; }
.order-time { font-size: 12px; color: #c5b8a8; }
.order-status { font-size: 13px; font-weight: 700; padding: 3px 10px;
  border-radius: 12px; font-size: 11px; }
.status-pending { background: #fff7e6; color: #d48806; }
.status-accepted { background: #e6f7ff; color: #096dd9; }
.status-delivering { background: #f9f0ff; color: #722ed1; }
.status-delivered { background: #f6ffed; color: #389e0d; }
.order-items { margin-bottom: 10px; }
.order-item { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
.order-total { text-align: right; font-weight: 700; color: var(--brown); font-size: 16px;
  padding-top: 10px; border-top: 1px solid #f8f0e8; }

/* Admin */
.admin-entry { position: fixed; right: 16px; bottom: 90px; width: 46px; height: 46px;
  border-radius: 50%; background: rgba(180,160,140,0.7); color: #fff; border: none;
  font-size: 20px; cursor: pointer; z-index: 200; display: flex;
  align-items: center; justify-content: center;
  box-shadow: 0 2px 12px rgba(139,109,82,0.2); transition: all .2s;
  backdrop-filter: blur(4px); }
.admin-entry:active { transform: scale(0.9); }
.admin-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.admin-title { font-size: 17px; font-weight: 700; color: var(--brown-dark); }
.status-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; flex-wrap: wrap; }
.status-btn { padding: 7px 16px; border-radius: 14px; border: none; font-size: 12px;
  font-weight: 600; cursor: pointer; transition: all .2s; }
.status-btn:active { transform: scale(0.95); }
.btn-accept { background: #e6f7ff; color: #1890ff; }
.btn-deliver { background: #f9f0ff; color: #722ed1; }
.btn-done { background: #f6ffed; color: #52c41a; }
.admin-product { display: flex; align-items: center; background: #fff;
  padding: 12px; border-radius: 16px; margin-bottom: 10px; box-shadow: var(--shadow); }
.ap-img-box { width: 64px; height: 64px; border-radius: 14px; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0; font-size: 30px; }
.ap-img-box.drink { background: linear-gradient(135deg,#fce4cc,#fef0e0); }
.ap-img-box.snack { background: linear-gradient(135deg,#fdf0d5,#fef9f0); }
.ap-img-box.emotion { background: linear-gradient(135deg,#fde2e2,#fef5f5); }
.ap-img-box.fruit { background: linear-gradient(135deg,#e8f5e0,#f5faf0); }
.ap-info { flex: 1; margin-left: 12px; }
.ap-name { font-size: 14px; font-weight: 600; }
.ap-meta { font-size: 11px; color: #c5b8a8; margin: 2px 0; }
.ap-price { font-size: 15px; color: var(--brown); font-weight: 700; }
.ap-price::before { content: '¥'; font-size: 11px; }
.ap-actions { display: flex; flex-direction: column; gap: 6px; }
.ap-actions button { padding: 6px 12px; border-radius: 10px; border: 1px solid #e8ddd0;
  font-size: 12px; cursor: pointer; background: #fff; color: var(--text);
  transition: all .2s; }
.ap-actions button:active { background: #faf5f0; }
.ap-actions .btn-del { color: #e88; border-color: #ffd8d0; }

/* Modal */
.modal-mask { position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(92,64,51,0.4); z-index: 300; display: flex;
  align-items: center; justify-content: center; padding: 20px;
  animation: fadeIn .2s ease; }
.modal { width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto;
  background: #fff; border-radius: 24px; padding: 24px; box-shadow: 0 20px 60px rgba(92,64,51,0.15); }

/* Product Detail */
.detail-img-box { width: 100%; height: 240px; border-radius: 20px; display: flex;
  align-items: center; justify-content: center; margin-bottom: 16px; }
.detail-emoji { font-size: 90px; filter: drop-shadow(0 8px 20px rgba(0,0,0,0.1)); }
.detail-img-box.drink { background: linear-gradient(135deg, #fce4cc, #fef0e0); }
.detail-img-box.snack { background: linear-gradient(135deg, #fdf0d5, #fef9f0); }
.detail-img-box.emotion { background: linear-gradient(135deg, #fde2e2, #fef5f5); }
.detail-img-box.fruit { background: linear-gradient(135deg, #e8f5e0, #f5faf0); }
.detail-name { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.detail-cat { display: inline-block; font-size: 12px; color: var(--brown);
  background: var(--orange-light); padding: 3px 14px; border-radius: 12px;
  margin-bottom: 14px; font-weight: 500; }
.detail-price { font-size: 28px; color: var(--brown); font-weight: 700; margin-bottom: 14px; }
.detail-price::before { content: '¥'; font-size: 18px; }
.detail-desc { font-size: 14px; color: #b0a090; line-height: 1.7; margin-bottom: 20px;
  background: #fef9f4; padding: 14px; border-radius: 14px; }

/* Empty */
.empty { display: flex; flex-direction: column; align-items: center; padding-top: 100px; }
.empty-icon { font-size: 64px; margin-bottom: 14px; opacity: 0.7; }
.empty-text { color: #c5b8a8; font-size: 14px; }
.go-shop-btn { margin-top: 20px; padding: 10px 32px; background: var(--brown);
  color: #fff; border: none; border-radius: 20px; font-size: 14px; cursor: pointer;
  text-decoration: none; display: inline-block; }

/* Login */
.login-box { text-align: center; }
.login-icon { font-size: 56px; margin-bottom: 14px; }
.login-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: var(--brown-dark); }
.login-desc { font-size: 13px; color: #c5b8a8; margin-bottom: 24px; }

/* Form */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 13px; font-weight: 500; color: var(--text-light);
  display: block; margin-bottom: 6px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 12px 14px; border: 2px solid #f0e6da; border-radius: 14px;
  font-size: 14px; font-family: inherit; background: #fefaf6; color: var(--text);
  transition: border-color .2s; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--brown); }
.form-textarea { min-height: 80px; resize: vertical; }
.img-preview { width: 100px; height: 100px; border-radius: 14px; object-fit: cover;
  margin-top: 8px; border: 2px solid #f0e6da; }
.btn-row { display: flex; gap: 10px; margin-top: 20px; }
.btn-primary { flex: 1; padding: 13px; background: linear-gradient(135deg, var(--brown), var(--brown-dark));
  color: #fff; border: none; border-radius: 20px; font-size: 15px; font-weight: 600;
  cursor: pointer; box-shadow: 0 4px 16px rgba(196,149,106,0.3); transition: all .2s; }
.btn-primary:active { transform: scale(0.97); }
.btn-secondary { flex: 1; padding: 13px; background: #f5f0ea; color: var(--text-light);
  border: none; border-radius: 20px; font-size: 15px; font-weight: 500; cursor: pointer; }
.btn-secondary:active { background: #ede5da; }

/* Toast */
.toast { position: fixed; top: 40%; left: 50%; transform: translate(-50%,-50%);
  background: rgba(92,64,51,0.85); color: #fff; padding: 14px 28px;
  border-radius: 20px; font-size: 14px; font-weight: 500; z-index: 999;
  pointer-events: none; opacity: 0; transition: opacity .25s;
  backdrop-filter: blur(8px); }
.toast.show { opacity: 1; }
.refresh-note { text-align: center; font-size: 11px; color: #d4c8b8; padding: 8px; }

button { font-family: inherit; }
/* Capybara decoration */
.capy-float { position: fixed; font-size: 60px; opacity: 0.06; pointer-events: none;
  z-index: -1; animation: float 8s ease-in-out infinite; }
.capy-float:nth-child(1) { top: 8%; right: 5%; animation-delay: 0s; }
.capy-float:nth-child(2) { bottom: 15%; left: 5%; animation-delay: -4s; }
@keyframes float { 0%,100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-20px) rotate(5deg); } }

img { max-width: 100%; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<!-- Floating capybaras -->
<div class="capy-float">🦫</div><div class="capy-float">🍊</div>

<!-- Header -->
<div class="header"><span class="header-capy">🦫</span><div><div class="header-title">水豚噜噜小店</div><div class="header-sub">慢慢来，都会好的 ~</div></div></div>

<!-- Tab Bar -->
<div class="tab-bar">
  <button class="tab-item active" data-page="shop" onclick="switchTab('shop')">
    <span class="tab-icon">🛍</span>小店
  </button>
  <button class="tab-item" data-page="cart" onclick="switchTab('cart')">
    <span class="tab-icon">🛒</span><span id="cartBadge" style="display:none;position:absolute;top:2px;right:50%;margin-right:-24px;background:var(--orange);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;min-width:18px;text-align:center;"></span>购物车
  </button>
  <button class="tab-item" data-page="orders" onclick="switchTab('orders')">
    <span class="tab-icon">📋</span>订单
  </button>
</div>

<button class="admin-entry" onclick="showAdminLogin()">⚙</button>

<!-- ===== SHOP ===== -->
<div class="page active" id="page-shop">
  <div class="cat-scroll"><div class="cat-bar" id="catBar"></div></div>
  <div class="product-grid" id="productGrid"></div>
  <div class="empty" id="shopEmpty" style="display:none">
    <div class="empty-icon">🦫</div><div class="empty-text">这个分类还没有商品哦 ~</div>
  </div>
</div>

<!-- ===== CART ===== -->
<div class="page" id="page-cart">
  <div id="cartList"></div>
  <div class="empty" id="cartEmpty"><div class="empty-icon">🛒</div><div class="empty-text">购物车空空如也</div><button class="go-shop-btn" onclick="switchTab('shop')">去逛逛</button></div>
  <div class="bottom-bar" id="cartBottomBar" style="display:none">
    <div><span class="total-label">合计 </span><span class="total-price" id="cartTotal">0</span></div>
    <button class="submit-btn" onclick="submitOrder()">下单噜</button>
  </div>
</div>

<!-- ===== ORDERS ===== -->
<div class="page" id="page-orders">
  <div id="orderList"></div>
  <div class="empty" id="ordersEmpty"><div class="empty-icon">📋</div><div class="empty-text">还没有订单哦</div></div>
  <div class="refresh-note">下拉可刷新</div>
</div>

<!-- ===== ADMIN ORDERS ===== -->
<div class="page" id="page-admin-orders">
  <div class="admin-bar"><span class="admin-title">📋 订单管理 <span id="adminOrderCount" style="font-size:13px;color:var(--text-light);font-weight:400"></span></span><button style="padding:8px 16px;border-radius:14px;border:2px solid var(--caramel);background:#fff;color:var(--brown);cursor:pointer;font-size:12px;font-weight:600" onclick="switchTab('admin-products')">管理商品</button></div>
  <div id="adminOrderList"></div>
  <div class="empty" id="adminOrdersEmpty"><div class="empty-icon">🦫</div><div class="empty-text">暂无订单，噜 ~</div></div>
  <div class="refresh-note">每 5 秒自动刷新</div>
  <div style="display:flex;gap:10px;margin-top:12px">
    <button style="flex:1;padding:12px;border-radius:16px;border:none;background:#f5f0ea;color:var(--text-light);font-size:14px;font-weight:500;cursor:pointer" onclick="showChangePwd()">🔑 改密码</button>
    <button style="flex:1;padding:12px;border-radius:16px;border:none;background:#f5f0ea;color:var(--text-light);font-size:14px;font-weight:500;cursor:pointer" onclick="adminLogout()">退出管理</button>
  </div>
</div>

<!-- ===== ADMIN PRODUCTS ===== -->
<div class="page" id="page-admin-products">
  <div class="admin-bar"><span class="admin-title">📦 商品管理</span><button style="padding:8px 16px;border-radius:14px;border:2px solid var(--caramel);background:#fff;color:var(--brown);cursor:pointer;font-size:12px;font-weight:600" onclick="switchTab('admin-orders')">订单管理</button></div>
  <button style="width:100%;padding:12px;background:linear-gradient(135deg,var(--brown),var(--brown-dark));color:#fff;border:none;border-radius:16px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:14px;box-shadow:0 4px 16px rgba(196,149,106,0.3)" onclick="openProductForm()">＋ 添加商品</button>
  <div id="adminProductList"></div>
  <div class="empty" id="adminProductsEmpty"><div class="empty-icon">📦</div><div class="empty-text">暂无商品</div></div>
  <button style="margin-top:20px;width:100%;padding:12px;border-radius:16px;border:none;background:#f5f0ea;color:var(--text-light);font-size:14px;font-weight:500;cursor:pointer" onclick="adminLogout()">退出管理</button>
</div>

<!-- ===== MODALS ===== -->
<div class="modal-mask" id="modalLogin" style="display:none" onclick="if(event.target===this)closeModal('modalLogin')">
  <div class="modal"><div class="login-box">
    <div class="login-icon">🦫</div><div class="login-title">管理员验证</div><div class="login-desc">请输入管理密码进入后台</div>
    <div class="form-group"><input class="form-input" type="password" id="loginPassword" placeholder="请输入管理密码" style="text-align:center"></div>
    <button class="btn-primary" style="width:100%" onclick="adminLogin()">验证进入</button>
    <button class="btn-secondary" style="width:100%;margin-top:8px" onclick="closeModal('modalLogin')">取消</button>
  </div></div>
</div>

<div class="modal-mask" id="modalDetail" style="display:none" onclick="if(event.target===this)closeModal('modalDetail')">
  <div class="modal" style="position:relative">
    <button onclick="closeModal('modalDetail')" style="position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;border:none;background:#f0e8dc;color:var(--text-light);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1">✕</button>
    <div class="detail-img-box" id="detailImgBox"><span class="detail-emoji" id="detailEmoji"></span></div>
    <div class="detail-name" id="detailName"></div>
    <div class="detail-cat" id="detailCat"></div>
    <div class="detail-price" id="detailPrice"></div>
    <div class="detail-desc" id="detailDesc"></div>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
      <span style="font-size:14px;color:var(--text-light);font-weight:500">数量</span>
      <button class="qty-btn" onclick="changeDetailQty(-1)">−</button>
      <span class="qty-num" id="detailQty">1</span>
      <button class="qty-btn" onclick="changeDetailQty(1)">＋</button>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="addToCartFromDetail()">加入购物车</button>
      <button class="btn-primary" onclick="buyNowFromDetail()">立即下单</button>
    </div>
  </div>
</div>

<div class="modal-mask" id="modalProductForm" style="display:none" onclick="if(event.target===this)closeModal('modalProductForm')">
  <div class="modal">
    <div style="font-size:18px;font-weight:700;margin-bottom:18px;color:var(--brown-dark)" id="formTitle">添加商品</div>
    <div class="form-group"><label class="form-label">名称</label><input class="form-input" id="formName" placeholder="商品名称"></div>
    <div class="form-group"><label class="form-label">分类</label><select class="form-select" id="formCategory"><option value="drink">🥤 饮品</option><option value="snack">🍟 小吃</option><option value="emotion">💕 情绪</option><option value="fruit">🍉 水果</option></select></div>
    <div class="form-group"><label class="form-label">价格 (元)</label><input class="form-input" type="number" id="formPrice" placeholder="0.00" step="0.01"></div>
    <div class="form-group"><label class="form-label">描述</label><textarea class="form-textarea" id="formDesc" placeholder="商品描述"></textarea></div>
    <div class="form-group"><label class="form-label">Emoji 图标</label><input class="form-input" id="formEmoji" placeholder="如 🍰🍊☕🍪" maxlength="2"></div>
    <div class="form-group"><label class="form-label">或上传图片</label><input type="file" accept="image/*" id="formImageInput" onchange="handleImageUpload(this)" style="display:block;margin-bottom:8px"><img class="img-preview" id="formImagePreview" style="display:none"></div>
    <div class="btn-row"><button class="btn-secondary" onclick="closeModal('modalProductForm')">取消</button><button class="btn-primary" onclick="saveProduct()">保存</button></div>
  </div>
</div>

<script>
// ============ SUPABASE ============
const sb = supabase.createClient(
  'https://aeredionxquqhblcqqly.supabase.co',
  'sb_publishable_AjEsEgPCQFnj1pyLJc8lOw_0f-hf74e'
);

// ============ CONSTANTS ============
const C = [
  { key: 'drink', label: '饮品', icon: '🥤', emoji: '🧋' },
  { key: 'snack', label: '小吃', icon: '🍪', emoji: '🍩' },
  { key: 'emotion', label: '情绪', icon: '💕', emoji: '💝' },
  { key: 'fruit', label: '水果', icon: '🍉', emoji: '🍓' }
];
const STATUS_LIST = [
  { key: 'pending', label: '未接单', color: '#faad14', cls: 'status-pending' },
  { key: 'accepted', label: '已接单', color: '#1890ff', cls: 'status-accepted' },
  { key: 'delivering', label: '配送中', color: '#722ed1', cls: 'status-delivering' },
  { key: 'delivered', label: '已送达', color: '#52c41a', cls: 'status-delivered' }
];
const NEXT = { pending: ['accepted'], accepted: ['delivering'], delivering: ['delivered'], delivered: [] };

function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 6); }
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1500); }
function fmtTime(d) { const dt=new Date(d); return `${dt.getMonth()+1}.${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`; }

if (!localStorage.getItem('adminPwd')) localStorage.setItem('adminPwd', '123456');

let cart = [], currentTab = 'shop', detailProduct = null, detailQty = 1, isAdmin = false, adminPoll = null;

// ============ CATEGORY EMOJI FOR PRODUCTS ============
function catEmoji(catKey) { const c = C.find(x=>x.key===catKey); return c?c.emoji:'📦'; }

// ============ SAMPLE PRODUCTS ============
const SAMPLE_PRODUCTS = [
  { name: '橘子气泡水', category: 'drink', price: 12, description: '清爽橘子味，像水豚泡在温泉里一样舒服 ~', emoji: '🍊' },
  { name: '温泉抹茶拿铁', category: 'drink', price: 16, description: '暖暖的抹茶，水豚最爱喝的午后饮品', emoji: '🍵' },
  { name: '噜噜燕麦奶', category: 'drink', price: 10, description: '健康又好喝，噜噜噜 ~', emoji: '🥛' },
  { name: '水豚小饼干', category: 'snack', price: 8, description: '可爱水豚造型饼干，一口一个', emoji: '🍪' },
  { name: '温泉馒头', category: 'snack', price: 12, description: '软软糯糯，和泡温泉的水豚一样治愈', emoji: '🍡' },
  { name: '橘子焦糖布丁', category: 'snack', price: 15, description: 'Q弹滑嫩，水豚看了都想吃', emoji: '🍮' },
  { name: '水豚式躺平', category: 'emotion', price: 0.01, description: '累了就一起躺平吧，不焦虑不急躁，像水豚一样 ~', emoji: '🦫' },
  { name: '温泉抱抱券', category: 'emotion', price: 0.01, description: '兑换一个温暖的抱抱，水豚都在羡慕你呢', emoji: '🫂' },
  { name: '打视频电话', category: 'emotion', price: 0.01, description: '想你了，视频聊聊天吧 ~ 不限时长哦', emoji: '📞' },
  { name: '委屈安慰包', category: 'emotion', price: 0.01, description: '受委屈了？我在这儿呢，水豚陪你摸摸头', emoji: '🥺' },
  { name: '甜蜜橘子', category: 'fruit', price: 6, description: '新鲜橘子，水豚头顶同款', emoji: '🍊' },
  { name: '草莓盒子', category: 'fruit', price: 18, description: '又大又甜的草莓，每一颗都精心挑选', emoji: '🍓' },
  { name: '阳光蜜瓜', category: 'fruit', price: 22, description: '日本进口蜜瓜，像水豚的生活一样甜', emoji: '🍈' },
  { name: '车厘子自由', category: 'fruit', price: 28, description: '实现车厘子自由就是最大的幸福！', emoji: '🍒' }
];

// ============ TAB SWITCHING ============
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  const pm={shop:'page-shop',cart:'page-cart',orders:'page-orders','admin-orders':'page-admin-orders','admin-products':'page-admin-products'};
  const pg=document.getElementById(pm[tab]); if(pg) pg.classList.add('active');
  const tm={shop:0,cart:1,orders:2};
  if(tm[tab]!==undefined) document.querySelectorAll('.tab-item')[tm[tab]].classList.add('active');
  if(adminPoll&&!['admin-orders','admin-products'].includes(tab)){clearInterval(adminPoll);adminPoll=null;}
  if(tab==='shop')renderShop(); if(tab==='cart')renderCart(); if(tab==='orders')loadOrders();
  if(tab==='admin-orders'){loadAdminOrders();startAdminPoll();}
  if(tab==='admin-products'){loadAdminProducts();startAdminPoll();}
  document.querySelector('.admin-entry').style.display=['admin-orders','admin-products'].includes(tab)?'none':'flex';
}
function startAdminPoll(){if(adminPoll)return;adminPoll=setInterval(()=>{if(currentTab==='admin-orders')loadAdminOrders();else if(currentTab==='admin-products')loadAdminProducts();},5000);}

// ============ SHOP ============
let activeCat='drink';
function renderShop(){document.getElementById('catBar').innerHTML=C.map(c=>`<button class="cat-item ${c.key===activeCat?'active':''}" onclick="setCategory('${c.key}')"><span class="cat-icon">${c.icon}</span>${c.label}</button>`).join('');loadProducts();}
function setCategory(key){activeCat=key;loadProducts();}
async function loadProducts(){
  const{data}=await sb.from('products').select('*').eq('category',activeCat).eq('isActive',true);
  let products=data||[];
  if(!products.length){
    // Check if database has any products at all
    const{data:all}=await sb.from('products').select('id').limit(1);
    if(!all||all.length===0){await seedProducts();return loadProducts();}
  }
  document.getElementById('productGrid').innerHTML=products.map(p=>`<div class="product-card" onclick="showDetail('${p.id}')">
    <div class="product-img-box ${p.category}"><span class="product-emoji">${p.emoji||catEmoji(p.category)}</span></div>
    <div class="product-info"><div class="product-name">${p.name}</div><div class="product-bottom"><span class="product-price">${p.price.toFixed(2)}</span><button class="add-btn" onclick="event.stopPropagation();quickAddCart('${p.id}')">＋</button></div></div></div>`).join('');
  document.getElementById('shopEmpty').style.display=products.length?'none':'flex';
  document.querySelectorAll('.cat-item').forEach((el,i)=>el.classList.toggle('active',C[i].key===activeCat));
}

async function seedProducts(){
  const items=SAMPLE_PRODUCTS.map(p=>({id:genId(),...p,isActive:true,image:'',created_at:new Date().toISOString()}));
  const{error}=await sb.from('products').insert(items);
  if(!error) toast('🎉 已添加水豚精选商品');
}

// ============ PRODUCT DETAIL ============
async function showDetail(id){
  const{data}=await sb.from('products').select('*').eq('id',id).single();
  if(!data)return;detailProduct=data;detailQty=1;
  document.getElementById('detailEmoji').textContent=data.emoji||catEmoji(data.category);
  document.getElementById('detailImgBox').className='detail-img-box '+data.category;
  document.getElementById('detailName').textContent=data.name;
  document.getElementById('detailCat').textContent=(C.find(c=>c.key===data.category)||{}).label||data.category;
  document.getElementById('detailPrice').textContent=data.price.toFixed(2);
  document.getElementById('detailDesc').textContent=data.description||'水豚出品，必属精品 ~';
  document.getElementById('detailQty').textContent='1';
  document.getElementById('modalDetail').style.display='flex';
}
function changeDetailQty(d){detailQty=Math.max(1,detailQty+d);document.getElementById('detailQty').textContent=detailQty;}
function addToCartFromDetail(){if(detailProduct){addCartItem(detailProduct,detailQty);closeModal('modalDetail');toast('已加入购物车 🦫');}}
function buyNowFromDetail(){addToCartFromDetail();switchTab('cart');}

// ============ CART ============
function quickAddCart(id){sb.from('products').select('*').eq('id',id).single().then(({data})=>{if(data){addCartItem(data,1);toast('已加入购物车 🦫');updateCartBadge();}});}
function addCartItem(product,qty){const idx=cart.findIndex(c=>c.id===product.id);if(idx>=0)cart[idx].quantity+=qty;else cart.push({...product,quantity:qty});updateCartBadge();}
function renderCart(){
  const list=document.getElementById('cartList'),empty=document.getElementById('cartEmpty'),bar=document.getElementById('cartBottomBar');
  if(!cart.length){list.innerHTML='';empty.style.display='flex';bar.style.display='none';}
  else{empty.style.display='none';bar.style.display='flex';document.getElementById('cartTotal').textContent=cart.reduce((s,i)=>s+i.price*i.quantity,0).toFixed(2);
    list.innerHTML=cart.map((item,idx)=>`<div class="cart-item">
      <div class="cart-img-box ${item.category}"><span class="cart-emoji">${item.emoji||catEmoji(item.category)}</span></div>
      <div class="cart-body"><div class="cart-name">${item.name}</div><div class="cart-price">${item.price.toFixed(2)}</div>
        <div class="cart-qty"><button class="qty-btn" onclick="changeCartQty(${idx},-1)">−</button><span class="qty-num">${item.quantity}</span><button class="qty-btn" onclick="changeCartQty(${idx},1)">＋</button></div></div>
      <button class="cart-del" onclick="removeCartItem(${idx})">删除</button></div>`).join('');}
}
function changeCartQty(idx,delta){if(cart[idx].quantity+delta<1)cart.splice(idx,1);else cart[idx].quantity+=delta;updateCartBadge();renderCart();}
function removeCartItem(idx){cart.splice(idx,1);updateCartBadge();renderCart();}
function updateCartBadge(){const b=document.getElementById('cartBadge');if(cart.length){b.style.display='inline';b.textContent=cart.length;}else b.style.display='none';}
async function submitOrder(){
  if(!cart.length)return toast('购物车为空哦 ~');
  const order={id:genId(),items:cart.map(c=>({productId:c.id,name:c.name,price:c.price,quantity:c.quantity,category:c.category})),total:cart.reduce((s,i)=>s+i.price*i.quantity,0),status:'pending',created_at:new Date().toISOString()};
  const{error}=await sb.from('orders').insert(order);
  if(error){toast('下单失败');return;}
  cart=[];updateCartBadge();renderCart();toast('下单成功！水豚正在赶来 🦫');
}

// ============ ORDERS ============
async function loadOrders(){
  const{data}=await sb.from('orders').select('*').order('created_at',{ascending:false});const orders=data||[];
  const list=document.getElementById('orderList'),empty=document.getElementById('ordersEmpty');
  if(!orders.length){list.innerHTML='';empty.style.display='flex';}else{empty.style.display='none';
    list.innerHTML=orders.map(o=>{const st=STATUS_LIST.find(s=>s.key===o.status)||{};
      return`<div class="order-card"><div class="order-header"><span class="order-time">${fmtTime(o.created_at)}</span><span class="order-status ${st.cls||''}">${st.label}</span></div><div class="order-items">${(o.items||[]).map(i=>`<div class="order-item"><span>${i.name} ×${i.quantity}</span><span>¥${(i.price*i.quantity).toFixed(2)}</span></div>`).join('')}</div><div class="order-total">合计 ¥${o.total.toFixed(2)}</div></div>`;}).join('');}
}

// ============ ADMIN ============
function showAdminLogin(){document.getElementById('modalLogin').style.display='flex';document.getElementById('loginPassword').value='';}
function adminLogin(){const pwd=document.getElementById('loginPassword').value;if(pwd===localStorage.getItem('adminPwd')){isAdmin=true;closeModal('modalLogin');switchTab('admin-orders');}else toast('密码错误');}
function adminLogout(){isAdmin=false;switchTab('shop');}

async function loadAdminOrders(){
  if(!isAdmin)return;const{data}=await sb.from('orders').select('*').order('created_at',{ascending:false});const orders=data||[];
  const list=document.getElementById('adminOrderList'),empty=document.getElementById('adminOrdersEmpty');
  document.getElementById('adminOrderCount').textContent=orders.length?`（共 ${orders.length} 单）`:'';
  if(!orders.length){list.innerHTML='';empty.style.display='flex';}else{empty.style.display='none';
    list.innerHTML=orders.map(o=>{const st=STATUS_LIST.find(s=>s.key===o.status)||{},nexts=NEXT[o.status]||[];
      return`<div class="order-card"><div class="order-header"><span class="order-time">${fmtTime(o.created_at)}</span><span class="order-status ${st.cls||''}">${st.label}</span></div><div class="order-items">${(o.items||[]).map(i=>`<div class="order-item"><span>【${(C.find(c=>c.key===i.category)||{}).label||i.category}】 ${i.name} ×${i.quantity}</span><span>¥${(i.price*i.quantity).toFixed(2)}</span></div>`).join('')}</div><div class="order-total">合计 ¥${o.total.toFixed(2)}</div>
      ${nexts.length?`<div class="status-btns">${nexts.map(ns=>{const cls=ns==='accepted'?'btn-accept':ns==='delivering'?'btn-deliver':'btn-done';const label=ns==='accepted'?'🫴 接单':ns==='delivering'?'🛵 配送中':'✅ 已送达';return`<button class="status-btn ${cls}" onclick="changeOrderStatus('${o.id}','${ns}')">${label}</button>`;}).join('')}</div>`:''}</div>`;}).join('');}
}
async function changeOrderStatus(id,newStatus){const{error}=await sb.from('orders').update({status:newStatus}).eq('id',id);if(error){toast('更新失败');return;}toast('状态已更新');loadAdminOrders();}

async function loadAdminProducts(){
  if(!isAdmin)return;const{data}=await sb.from('products').select('*').order('created_at',{ascending:false});const products=data||[];
  const list=document.getElementById('adminProductList'),empty=document.getElementById('adminProductsEmpty');
  if(!products.length){list.innerHTML='';empty.style.display='flex';}else{empty.style.display='none';
    list.innerHTML=products.map(p=>`<div class="admin-product"><div class="ap-img-box ${p.category}"><span style="font-size:28px">${p.emoji||catEmoji(p.category)}</span></div><div class="ap-info"><div class="ap-name">${p.name}</div><div class="ap-meta">${(C.find(c=>c.key===p.category)||{}).label||p.category} · <span style="color:${p.isActive!==false?'#8db580':'#e88'};font-weight:600">${p.isActive!==false?'上架中':'已下架'}</span></div><div class="ap-price">${p.price.toFixed(2)}</div></div><div class="ap-actions"><button onclick="editProduct('${p.id}')">编辑</button><button style="color:${p.isActive!==false?'#e88':'#8db580'};border-color:${p.isActive!==false?'#ffd8d0':'#d0e8d0'}" onclick="toggleProduct('${p.id}')">${p.isActive!==false?'下架':'上架'}</button><button class="btn-del" onclick="deleteProduct('${p.id}')">删除</button></div></div>`).join('');}
}
let editingId=null;
function openProductForm(){editingId=null;document.getElementById('formTitle').textContent='添加商品';document.getElementById('formName').value='';document.getElementById('formCategory').value='drink';document.getElementById('formPrice').value='';document.getElementById('formDesc').value='';document.getElementById('formEmoji').value='';document.getElementById('formImagePreview').style.display='none';document.getElementById('formImageInput').value='';document.getElementById('modalProductForm').style.display='flex';}
async function editProduct(id){const{data}=await sb.from('products').select('*').eq('id',id).single();if(!data)return;editingId=id;document.getElementById('formTitle').textContent='编辑商品';document.getElementById('formName').value=data.name;document.getElementById('formCategory').value=data.category;document.getElementById('formPrice').value=data.price;document.getElementById('formDesc').value=data.description||'';document.getElementById('formEmoji').value=data.emoji||'';if(data.image){document.getElementById('formImagePreview').src=data.image;document.getElementById('formImagePreview').style.display='block';}else{document.getElementById('formImagePreview').style.display='none';}document.getElementById('modalProductForm').style.display='flex';}
function handleImageUpload(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){document.getElementById('formImagePreview').src=e.target.result;document.getElementById('formImagePreview').style.display='block';};reader.readAsDataURL(file);}
async function saveProduct(){
  const name=document.getElementById('formName').value.trim(),price=parseFloat(document.getElementById('formPrice').value);
  if(!name||isNaN(price))return toast('请填写名称和价格');
  const emoji=document.getElementById('formEmoji').value.trim();
  const baseData={name,price,category:document.getElementById('formCategory').value,description:document.getElementById('formDesc').value.trim(),emoji:emoji||null,image:document.getElementById('formImagePreview').src||''};
  if(editingId){await sb.from('products').update(baseData).eq('id',editingId);}else{await sb.from('products').insert({id:genId(),...baseData,isActive:true,created_at:new Date().toISOString()});}
  closeModal('modalProductForm');toast('保存成功 🦫');loadAdminProducts();
}
async function deleteProduct(id){if(!confirm('确认删除这个商品吗？'))return;await sb.from('products').delete().eq('id',id);toast('已删除');loadAdminProducts();}
function closeModal(id){document.getElementById(id).style.display='none';}
async function toggleProduct(id){const{data}=await sb.from('products').select('isActive').eq('id',id).single();if(!data)return;const newVal=!(data.isActive!==false);await sb.from('products').update({isActive:newVal}).eq('id',id);toast(newVal?'已上架':'已下架');loadAdminProducts();}

// ============ CHANGE PASSWORD ============
function showChangePwd(){
  const div=document.createElement('div');
  div.className='modal-mask'; div.style.display='flex'; div.id='modalChangePwd';
  div.onclick=function(e){if(e.target===this)this.remove();};
  div.innerHTML=`<div class="modal"><div style="font-size:18px;font-weight:700;margin-bottom:16px;color:var(--brown-dark)">🔑 修改管理密码</div>
    <div class="form-group"><label class="form-label">旧密码</label><input class="form-input" type="password" id="oldPwd" placeholder="输入旧密码"></div>
    <div class="form-group"><label class="form-label">新密码</label><input class="form-input" type="password" id="newPwd" placeholder="输入新密码"></div>
    <div class="form-group"><label class="form-label">确认新密码</label><input class="form-input" type="password" id="confirmPwd" placeholder="再次输入新密码"></div>
    <div class="btn-row"><button class="btn-secondary" onclick="document.getElementById('modalChangePwd').remove()">取消</button><button class="btn-primary" onclick="doChangePwd()">确认修改</button></div></div>`;
  document.body.appendChild(div);
}
function doChangePwd(){
  const oldPwd=document.getElementById('oldPwd').value,newPwd=document.getElementById('newPwd').value,confirmPwd=document.getElementById('confirmPwd').value;
  if(oldPwd!==localStorage.getItem('adminPwd'))return toast('旧密码错误');
  if(!newPwd||newPwd.length<3)return toast('新密码至少3位');
  if(newPwd!==confirmPwd)return toast('两次密码不一致');
  localStorage.setItem('adminPwd',newPwd);document.getElementById('modalChangePwd').remove();toast('密码已修改 🦫');
}

// ============ INIT ============
renderShop();
</script>
</body>
</html>
